services:
  tracefinity:
    image: ghcr.io/tracefinity/tracefinity
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/storage
    # environment:
      # GOOGLE_API_KEY: your-key
    restart: unless-stopped
    # Run as your host user so files in ./data are owned by you, not root.
    # Set these to your UID/GID or run: echo "$(id -u):$(id -g)"
    # user: "1000:1000"
