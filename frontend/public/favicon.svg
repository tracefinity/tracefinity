<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect x="56" y="56" width="400" height="400" rx="64" stroke="#3b9ece" stroke-width="22" fill="#0c0e12"/>

  <!-- polygon edges -->
  <g stroke="#e8eaed" stroke-width="10" stroke-linecap="round" opacity="0.55">
    <line x1="170" y1="180" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="350" y2="280"/>
    <line x1="350" y1="280" x2="260" y2="340"/>
    <line x1="260" y1="340" x2="160" y2="300"/>
    <line x1="160" y1="300" x2="170" y2="180"/>
  </g>

  <!-- cross-connections -->
  <g stroke="#8b95a5" stroke-width="6" stroke-linecap="round" opacity="0.25">
    <line x1="170" y1="180" x2="350" y2="280"/>
    <line x1="300" y1="160" x2="260" y2="340"/>
  </g>

  <!-- vertex nodes -->
  <circle cx="170" cy="180" r="16" fill="#3b9ece"/>
  <circle cx="300" cy="160" r="14" fill="#e8eaed"/>
  <circle cx="350" cy="280" r="14" fill="#e8eaed"/>
  <circle cx="260" cy="340" r="14" fill="#e8eaed"/>
  <circle cx="160" cy="300" r="16" fill="#3b9ece"/>
</svg>
