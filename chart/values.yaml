# Default values for tracefinity.
# This YAML file declares values passed into the chart templates.

# This application is currently designed to run with a single replica, as it uses local storage for data persistence. 
replicaCount: 1

image:
  repository: ghcr.io/tracefinity/tracefinity
  pullPolicy: IfNotPresent
  tag: ""

env:
  GOOGLE_API_KEY: "" # Google API key for Gemini. Leave blank to disable.
  TRACERS: "" # Comma-separated list of available tracers, e.g. gemini,birefnet-lite,isnet
  TRACEFINITY_ONNX_PROVIDER: "" # Local ONNX provider: auto, cuda, or cpu
  GEMINI_IMAGE_MODEL: "" # Gemini model for mask generation

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClass: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources: {}
  # Default resources are omitted for broader compatibility.
  # Uncomment and adjust the following if you want to specify them.
  # limits:
  #   cpu: 100m
  #   memory: 2Gi # Baseline for local tracing models. Tune to your model size/workload.
  # requests:
  #   cpu: 100m
  #   memory: 2Gi # Baseline for local tracing models. Tune to your model size/workload.

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 24 # 2 minutes total startup time before failure
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
